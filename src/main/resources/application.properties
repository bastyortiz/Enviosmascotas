spring.application.name=enviosmascotas

# Configuración de Oracle Cloud con Wallet
# IMPORTANTE: Reemplaza 'mibd_high' por el nombre de servicio que aparece en tu archivo tnsnames.ora
spring.datasource.url=jdbc:oracle:thin:@mibd_high
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=C:/Wallet_MIBD

# Credenciales del nuevo usuario
spring.datasource.username=USER_MASCOTAS
spring.datasource.password=TuPassword123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración de JPA y Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Ajuste para evitar conflictos de inicialización
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never
